<!-- ===== Claude preview feedback widget (not part of the app) ===== -->
<style>
#fbWidget,#fbWidget *{box-sizing:border-box;font-family:system-ui,sans-serif}
#fbToggle{position:fixed;bottom:14px;left:14px;z-index:2147483000;background:#7c3aed;color:#fff;border:none;border-radius:24px;padding:10px 16px;font-size:14px;font-weight:600;box-shadow:0 4px 12px rgba(0,0,0,.35);cursor:pointer}
#fbToggle.armed{background:#dc2626}
.fb-hl{outline:3px solid #7c3aed !important;outline-offset:2px !important}
#fbPanel{position:fixed;bottom:64px;left:14px;z-index:2147483001;width:min(340px,calc(100vw - 28px));background:#1f2430;color:#eee;border:1px solid #7c3aed;border-radius:12px;padding:12px;box-shadow:0 8px 24px rgba(0,0,0,.5);display:none;font-size:13px}
#fbPanel h4{margin:0 0 6px;font-size:13px;color:#c4b5fd}
#fbPanel textarea{width:100%;min-height:60px;background:#141821;color:#eee;border:1px solid #444;border-radius:8px;padding:8px;font-size:14px}
#fbPanel button{background:#7c3aed;color:#fff;border:none;border-radius:8px;padding:8px 12px;margin-top:8px;margin-right:6px;cursor:pointer;font-size:13px}
#fbPanel button.fb-sec{background:#374151}
#fbTargetLbl{font-size:11px;color:#9ca3af;word-break:break-all;margin-bottom:6px}
#fbList{max-height:160px;overflow-y:auto;margin:8px 0;font-size:12px}
#fbList>div{border-bottom:1px solid #333;padding:6px 0;display:flex;gap:6px;align-items:flex-start}
#fbList .fb-x{color:#f87171;cursor:pointer;font-weight:700}
#fbCount{background:#fff;color:#7c3aed;border-radius:10px;padding:0 6px;margin-left:6px;font-size:12px}
#fbOut{width:100%;min-height:120px;background:#141821;color:#a7f3d0;border:1px solid #444;border-radius:8px;padding:8px;font-size:11px;display:none;margin-top:8px}
</style>
<div id="fbWidget">
  <button id="fbToggle">&#128221; Feedback<span id="fbCount" style="display:none">0</span></button>
  <div id="fbPanel"></div>
</div>
<script>
(function(){
  var KEY='fb_notes_pr1';
  var notes=[];try{notes=JSON.parse(sessionStorage.getItem(KEY)||'[]')}catch(e){}
  var armed=false,target=null;
  var $=function(id){return document.getElementById(id)};
  function desc(el){
    var parts=[],n=el,depth=0;
    while(n&&n.tagName&&depth<3){
      var d=n.tagName.toLowerCase();
      if(n.id){parts.unshift(d+'#'+n.id);break}
      if(n.className&&typeof n.className==='string'&&n.className.trim())d+='.'+n.className.trim().split(/\s+/).slice(0,2).join('.');
      parts.unshift(d);n=n.parentElement;depth++;
    }
    var t=(el.textContent||el.value||'').trim().replace(/\s+/g,' ').slice(0,50);
    return parts.join(' > ')+(t?' — "'+t+'"':'');
  }
  function save(){sessionStorage.setItem(KEY,JSON.stringify(notes))}
  function report(){
    var hdr='## GymLog preview feedback\nViewport: '+innerWidth+'x'+innerHeight+' | theme: '+(document.documentElement.getAttribute('data-theme')||'default')+' | notes: '+notes.length+'\n\n';
    return hdr+notes.map(function(n,i){return (i+1)+'. **['+n.el+']**\n   '+n.txt}).join('\n');
  }
  function renderPanel(mode){
    var p=$('fbPanel');p.style.display='block';
    if(mode==='note'){
      p.innerHTML='<h4>Add a note for:</h4><div id="fbTargetLbl"></div><textarea id="fbTxt" placeholder="What should change here?"></textarea><div><button id="fbAdd">Add note</button><button class="fb-sec" id="fbCancel">Cancel</button></div>';
      $('fbTargetLbl').textContent=desc(target);
      $('fbAdd').onclick=function(){
        var t=$('fbTxt').value.trim();
        if(t){notes.push({el:desc(target),txt:t});save();updateCount()}
        clearHl();renderPanel('list');
      };
      $('fbCancel').onclick=function(){clearHl();renderPanel('list')};
      $('fbTxt').focus();
    }else{
      p.innerHTML='<h4>Feedback notes</h4><div id="fbList">'+(notes.length?notes.map(function(n,i){return '<div><span class="fb-x" data-i="'+i+'">&#10005;</span><span><b>'+n.el+'</b><br>'+n.txt+'</span></div>'}).join(''):'<i>Tap red button is ON — tap any part of the app to annotate it.</i>')+'</div><div><button id="fbCopy">Copy report</button><button class="fb-sec" id="fbHide">Hide</button></div><textarea id="fbOut" readonly></textarea>';
      p.querySelectorAll('.fb-x').forEach(function(x){x.onclick=function(){notes.splice(+x.dataset.i,1);save();updateCount();renderPanel('list')}});
      $('fbCopy').onclick=function(){
        var r=report();
        var done=function(){$('fbCopy').textContent='Copied! Paste it to Claude'};
        if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(r).then(done,function(){fallback(r)})}else{fallback(r)}
        function fallback(txt){var o=$('fbOut');o.style.display='block';o.value=txt;o.select();try{document.execCommand('copy');done()}catch(e){}}
      };
      $('fbHide').onclick=function(){p.style.display='none'};
    }
  }
  function updateCount(){var c=$('fbCount');c.style.display=notes.length?'inline-block':'none';c.textContent=notes.length}
  var hl=null;
  function clearHl(){if(hl){hl.classList.remove('fb-hl');hl=null}}
  $('fbToggle').onclick=function(){
    armed=!armed;this.classList.toggle('armed',armed);
    this.childNodes[0].nodeValue=armed?'⏺ Tap an element ':'📝 Feedback';
    if(armed)renderPanel('list');else{clearHl();$('fbPanel').style.display='none'}
  };
  document.addEventListener('click',function(e){
    if(!armed)return;
    if(e.target.closest('#fbWidget'))return;
    e.preventDefault();e.stopPropagation();
    clearHl();target=e.target;hl=target;hl.classList.add('fb-hl');
    renderPanel('note');
  },true);
  updateCount();
})();
</script>
